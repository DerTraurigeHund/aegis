<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Monitor</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body data-theme="dark">
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen hidden">
      <div class="login-container">
        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="#6B4EFF"/>
            <path d="M14 34V14h6l4 8 4-8h6v20h-5V21l-5 9-5-9v13h-5z" fill="white"/>
          </svg>
        </div>
        <h1>Server Monitor</h1>
        <p class="login-subtitle">Verbindung zum Backend herstellen</p>
        <div class="login-form">
          <div class="input-group">
            <label for="server-url">Server URL</label>
            <input type="text" id="server-url" placeholder="http://192.168.1.100:8000" value="" />
          </div>
          <div class="input-group">
            <label for="api-key">API-Key</label>
            <input type="password" id="api-key" placeholder="API-Key eingeben" />
            <button class="toggle-pw" onclick="toggleApiKey()" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <button class="btn-primary" onclick="connect()" id="connect-btn">
            <span class="btn-text">Verbinden</span>
            <span class="btn-loader hidden">
              <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2a10 10 0 0 1 10 10"/>
              </svg>
            </span>
          </button>
          <p id="login-error" class="error-msg hidden"></p>
        </div>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="screen hidden">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#6B4EFF"/>
            <path d="M14 34V14h6l4 8 4-8h6v20h-5V21l-5 9-5-9v13h-5z" fill="white"/>
          </svg>
          <div class="topbar-info">
            <span class="topbar-title" id="server-name">Server</span>
            <span class="topbar-url" id="server-url-display">url</span>
          </div>
        </div>
        <div class="topbar-right">
          <span class="status-dot" id="health-dot"></span>
          <button class="icon-btn" onclick="refreshAll()" title="Aktualisieren">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 12a10 10 0 0 1 18.07-5.07M22 12a10 10 0 0 1-18.07 5.07"/></svg>
          </button>
          <button class="icon-btn" onclick="disconnect()" title="Trennen">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </header>

      <!-- Scrollable Content -->
      <main class="main-content">
        <!-- System Stats -->
        <section id="system-section">
          <div class="section-header">
            <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg> System</h2>
            <span class="update-timestamp" id="stats-timestamp"></span>
          </div>
          <div class="stats-grid" id="stats-grid">
            <div class="stat-card cpu">
              <div class="stat-header"><span class="stat-icon cpu-icon"></span>CPU</div>
              <div class="stat-value" id="cpu-value">-</div>
              <div class="stat-bar"><div class="stat-bar-fill" id="cpu-bar" style="width:0%"></div></div>
              <div class="stat-detail" id="cpu-detail">- Cores</div>
            </div>
            <div class="stat-card ram">
              <div class="stat-header"><span class="stat-icon ram-icon"></span>RAM</div>
              <div class="stat-value" id="ram-value">-</div>
              <div class="stat-bar"><div class="stat-bar-fill" id="ram-bar" style="width:0%"></div></div>
              <div class="stat-detail" id="ram-detail">-</div>
            </div>
            <div class="stat-card disk">
              <div class="stat-header"><span class="stat-icon disk-icon"></span>Disk</div>
              <div class="stat-value" id="disk-value">-</div>
              <div class="stat-bar"><div class="stat-bar-fill" id="disk-bar" style="width:0%"></div></div>
              <div class="stat-detail" id="disk-detail">-</div>
            </div>
            <div class="stat-card uptime">
              <div class="stat-header"><span class="stat-icon uptime-icon"></span>Uptime</div>
              <div class="stat-value" id="uptime-value">-</div>
              <div class="stat-detail" id="uptime-detail"></div>
            </div>
          </div>
          <!-- Disk list detail -->
          <div id="disk-detail-section" class="disk-list hidden">
            <h3>Mount Points</h3>
            <div id="disk-mounts"></div>
          </div>
          <!-- Network stats -->
          <div id="network-section" class="hidden" style="margin-top:12px;">
            <div class="stat-row">
              <span>Gesendet</span><span id="net-sent">-</span>
              <span>Empfangen</span><span id="net-recv">-</span>
              <span>Prozesse</span><span id="process-count">-</span>
            </div>
          </div>
        </section>

        <!-- Projects -->
        <section id="projects-section">
          <div class="section-header">
            <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Projekte</h2>
            <div class="section-actions">
              <span class="mini-stats" id="project-summary">0 · 0 · 0</span>
              <button class="btn-sm" onclick="showAddProject()">+ Hinzufügen</button>
            </div>
          </div>
          <div id="projects-loading" class="loading-spinner">
            <svg class="spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B4EFF" stroke-width="2.5"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
          </div>
          <div id="projects-empty" class="empty-state hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8888AA" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <p>Keine Projekte</p>
            <button class="btn-primary" onclick="showAddProject()">Projekt anlegen</button>
          </div>
          <div id="projects-error" class="error-card hidden"></div>
          <div id="projects-list"></div>
        </section>

        <!-- Detail Modal -->
        <div id="detail-modal" class="modal-overlay hidden" onclick="closeDetail()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
              <div>
                <h3 id="detail-name">-</h3>
                <span class="detail-type" id="detail-type">-</span>
              </div>
              <button class="icon-btn" onclick="closeDetail()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div id="detail-body"></div>
          </div>
        </div>

        <!-- Add Project Modal -->
        <div id="add-modal" class="modal-overlay hidden" onclick="closeAdd()">
          <div class="modal-content modal-sm" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3>Projekt anlegen</h3>
              <button class="icon-btn" onclick="closeAdd()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <form id="add-form" onsubmit="createProject(event)">
              <div class="input-group">
                <label>Name</label>
                <input type="text" id="add-name" required placeholder="Mein Projekt" />
              </div>
              <div class="input-group">
                <label>Typ</label>
                <select id="add-type" onchange="toggleProjectType()">
                  <option value="shell">Shell</option>
                  <option value="docker">Docker</option>
                </select>
              </div>
              <div id="add-shell-fields">
                <div class="input-group">
                  <label>Command</label>
                  <input type="text" id="add-command" placeholder="npm start" />
                </div>
                <div class="input-group">
                  <label>Working Directory</label>
                  <input type="text" id="add-cwd" placeholder="/opt/app" />
                </div>
              </div>
              <div id="add-docker-fields" class="hidden">
                <div class="input-group">
                  <label>Container Name</label>
                  <input type="text" id="add-container" placeholder="my-app" />
                </div>
                <div class="input-group">
                  <label>Image</label>
                  <input type="text" id="add-image" placeholder="redis:7-alpine" />
                </div>
                <div class="input-group">
                  <label>Run Options</label>
                  <input type="text" id="add-run-opts" placeholder="-p 6379:6379" />
                </div>
              </div>
              <div class="input-group">
                <label>Max Restarts</label>
                <select id="add-restarts">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3" selected>3</option>
                  <option value="5">5</option>
                  <option value="10">10</option>
                </select>
              </div>
              <p id="add-error" class="error-msg hidden"></p>
              <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Erstellen</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
