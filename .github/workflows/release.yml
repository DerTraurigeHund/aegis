name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.0.0

jobs:
  flutter-build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Generate keystore for release signing
        working-directory: flutter_app/android/app
        run: |
          keytool -genkey -v -keystore key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias aegis -storepass aegis123 -keypass aegis123 -dname "CN=Aegis, OU=Aegis, O=Aegis, L=Berlin, ST=Berlin, C=DE"
          cat > ../key.properties << EOF
          storeFile=key.jks
          keyAlias=aegis
          storePassword=aegis123
          keyPassword=aegis123
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [flutter-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: aegis-release-apk

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          LOG=$(git log --oneline --no-decorate ${PREV_TAG}...HEAD 2>/dev/null || echo "Initial release")
          cat > release-notes.md << EOF
          ## Aegis ${{ steps.version.outputs.VERSION }}

          ### Changes
          $LOG

          ### Downloads
          - [Aegis ${{ steps.version.outputs.VERSION }} APK](app-release.apk) – Android Release Build (arm64-v8a + armeabi-v7a + x86_64)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aegis v${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          files: |
            app-release.apk
          make_latest: true
